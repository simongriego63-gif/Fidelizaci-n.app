<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja - Mi Café</title>

    <link rel="manifest" href="manifest-barista.json">
    <meta name="theme-color" content="#1A110C">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            /* Paleta Mi Café - Chill & Fachero */
            --bg-dark: #3C2A21;
            --bg-darker: #2A1D16;
            --bg-darkest: #1A110C;
            --cream: #E5E0DA;
            --cream-soft: rgba(229, 224, 218, 0.12);
            --cream-glow: rgba(229, 224, 218, 0.25);
            --bronze: #B09B71;
            --bronze-soft: rgba(176, 155, 113, 0.15);
            --bronze-glow: rgba(176, 155, 113, 0.5);
            
            /* Colores aurora */
            --aurora-1: rgba(176, 155, 113, 0.3);
            --aurora-2: rgba(139, 90, 43, 0.2);
            --aurora-3: rgba(90, 70, 50, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-darkest);
            color: var(--cream);
            text-align: center;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* === FONDO AURORA ANIMADO === */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--bg-darkest);
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatAurora 20s ease-in-out infinite;
        }

        .aurora-blob:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--aurora-1);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .aurora-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--aurora-2);
            bottom: -50px;
            right: -80px;
            animation-delay: -5s;
        }

        .aurora-blob:nth-child(3) {
            width: 300px;
            height: 300px;
            background: var(--aurora-3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatAurora {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        .main-container { 
            position: relative;
            z-index: 1;
            width: 100%; 
            max-width: 400px; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .card-header h1 { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 26px; 
            color: var(--cream); 
            margin: 0; 
            letter-spacing: 1px; 
            font-weight: 700;
        }

        .modern-card { 
            background: rgba(60, 42, 33, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            padding: 30px 25px; 
            width: 100%; 
            margin-bottom: 20px; 
            border: 1px solid rgba(229, 224, 218, 0.08); 
        }

        /* --- LOGIN --- */
        #pantallaLogin { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 40px;
            /* Fondo semi-transparente para ver la aurora */
            background: rgba(26, 17, 12, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .pin-input { 
            padding: 20px; 
            border-radius: 16px; 
            border: 1.5px solid rgba(229, 224, 218, 0.1); 
            font-size: 32px; 
            text-align: center; 
            width: 100%; max-width: 200px; 
            margin-bottom: 30px; 
            letter-spacing: 10px; 
            font-weight: 700; 
            color: var(--cream); 
            font-family: 'Inter', monospace; 
            background: rgba(0, 0, 0, 0.3); 
            transition: all 0.3s; 
            outline: none;
        }
        .pin-input:focus { 
            border-color: var(--bronze); 
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(176, 155, 113, 0.15); 
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.4s; border-color: #E74C3C !important; color: #E74C3C;}

        /* --- BÚSQUEDA --- */
        #reader { 
            width: 100%; 
            max-width: 260px; 
            margin: 0 auto 20px auto; 
            border-radius: 20px; 
            overflow: hidden; 
            background-color: var(--bg-darkest); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            border: 2px solid rgba(176, 155, 113, 0.3); 
        }
        #reader button { 
            background-color: var(--bronze); 
            color: var(--bg-darkest); 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            font-family: 'Inter', sans-serif; 
            font-weight: 700; 
            cursor: pointer; 
            margin: 15px; 
        }
        
        .separador { 
            margin: 30px 0 20px 0; 
            color: var(--cream); 
            opacity: 0.5;
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 600;
        }
        .input-manual-group { display: flex; flex-direction: column; gap: 12px; width: 100%;}
        .input-manual-group input { 
            width: 100%; padding: 18px; 
            border-radius: 16px; 
            border: 1.5px solid rgba(229, 224, 218, 0.1); 
            font-size: 16px; 
            background: rgba(0, 0, 0, 0.3); 
            color: var(--cream); 
            transition: all 0.2s; 
            text-align: center; 
            font-weight: 600; 
            font-family: 'Inter', sans-serif; 
            outline: none;
        }
        .input-manual-group input:focus { 
            border-color: var(--bronze); 
            background: rgba(0, 0, 0, 0.4);
        }
        .input-manual-group input::placeholder { color: var(--cream); opacity: 0.35; }
        
        /* --- ACCIONES (MODAL CENTRAL) --- */
        #pantallaAcciones { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(26, 17, 12, 0.85); 
            z-index: 1000; display: none; align-items: center; justify-content: center; 
            padding: 24px; box-sizing: border-box; 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }
        .acciones-content { 
            width: 100%; max-width: 360px; 
            background: rgba(60, 42, 33, 0.95);
            border-radius: 28px; padding: 32px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(229, 224, 218, 0.1); 
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .cliente-info-header { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 25px; }
        .cliente-avatar { 
            width: 70px; height: 70px; 
            background: linear-gradient(145deg, var(--bronze), #8B5A2B); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 700; color: var(--cream); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            font-family: 'Space Grotesk', sans-serif;
        }
        .cliente-nombre { font-size: 20px; font-weight: 700; color: var(--cream); }
        .cliente-tel { color: var(--cream); opacity: 0.6; font-size: 13px; margin-top: 2px; display: block; font-weight: 500;}
        
        .estado-sellos-container { 
            background: rgba(0, 0, 0, 0.25); 
            border-radius: 20px; padding: 24px; margin-bottom: 28px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: 1px solid rgba(229, 224, 218, 0.05); 
        }
        .estado-sellos-texto { font-size: 12px; color: var(--cream); opacity: 0.6; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px;}
        .estado-sellos-numero { color: var(--bronze); font-weight: 800; font-size: 48px; line-height: 1; font-family: 'Space Grotesk', sans-serif;}
        .estado-sellos-numero span { font-size: 20px; opacity: 0.5; color: var(--cream); font-family: 'Inter', sans-serif;}

        /* --- BOTONES MODERNOS --- */
        .btn-stack { display: flex; flex-direction: column; gap: 12px; width: 100%;}
        .btn { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            font-size: 15px; font-weight: 700; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-family: 'Inter', sans-serif; letter-spacing: 0.5px;
        }
        .btn-brand { 
            background: var(--bronze); color: var(--bg-darkest); 
            box-shadow: 0 4px 15px rgba(176, 155, 113, 0.2); 
        }
        .btn-brand:active { transform: scale(0.98); } 
        .btn-brand:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(176, 155, 113, 0.3); }

        .btn-gold { 
            background: #E5E0DA; color: var(--bg-darkest); display: none; 
            box-shadow: 0 0 30px rgba(229, 224, 218, 0.3); 
            animation: pulseGlow 2s infinite;
        }
        .btn-gold:active { transform: scale(0.98); }
        
        .btn-outlined { 
            background: transparent; border: 1.5px solid rgba(229, 224, 218, 0.15); 
            color: var(--cream); padding: 16px; font-size: 14px; border-radius: 14px;
        }
        .btn-outlined:active { background: rgba(229, 224, 218, 0.05); border-color: rgba(229, 224, 218, 0.3); }
        
        #mensajeLoader { margin-top: 20px; color: var(--bronze); display: none; font-weight: 600; font-size: 14px; animation: titilar 1s infinite;}

        /* =========================================
           NUEVOS MODALES PERSONALIZADOS (ALERTS)
           ========================================= */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 17, 12, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 3000; display: none; align-items: center; justify-content: center;
            padding: 24px; box-sizing: border-box;
        }
        .custom-modal-box {
            background: rgba(60, 42, 33, 0.95); border-radius: 24px; padding: 36px 28px;
            width: 100%; max-width: 340px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(229, 224, 218, 0.1);
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .custom-modal-text { color: var(--cream); font-size: 15px; margin-bottom: 28px; font-weight: 500; line-height: 1.6;}
        .modal-btn-row { display: flex; gap: 12px; }
        .btn-modal-ok { 
            flex: 1; background: var(--bronze); color: var(--bg-darkest); border: none; 
            padding: 16px; border-radius: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
        }
        .btn-modal-cancel { 
            flex: 1; background: transparent; color: var(--cream); border: 1.5px solid rgba(229, 224, 218, 0.2); 
            padding: 16px; border-radius: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" class="custom-modal-text">Mensaje de error</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Aceptar</button>
        </div>
    </div>

    <div id="modalConfirmCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoConfirmCustom" class="custom-modal-text">¿Confirmas la entrega?</div>
            <div class="modal-btn-row">
                <button id="btnCancelarConfirm" class="btn-modal-cancel">Cancelar</button>
                <button id="btnAceptarConfirm" class="btn-modal-ok">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="pantallaLogin">
        <h2 style="font-family: 'Space Grotesk', sans-serif; color: var(--cream); font-size: 32px; letter-spacing: 1px; margin-bottom: 8px;">MI CAFÉ</h2>
        <p style="color: var(--cream); opacity: 0.6; margin-bottom: 30px; font-size: 14px; font-weight: 500;">Ingresa el PIN para operar la caja</p>
        <input type="password" id="inputPin" class="pin-input" placeholder="****" maxlength="4" inputmode="numeric">
        <button id="btnDesbloquear" class="btn btn-brand" style="max-width: 200px;">Desbloquear Caja</button>
    </div>

    <div class="main-container">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; padding: 0 5px;">
            <h1>MI CAFÉ</h1>
            <div style="font-size: 11px; color: var(--bronze); font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 1px; background: rgba(176, 155, 113, 0.15); padding: 4px 8px; border-radius: 6px;">SCANNER v1.4</div>
        </div>

        <div id="mensajeLoader">Buscando tarjeta...</div>

        <div id="pantallaBusqueda" class="modern-card">
            <p style="color: var(--cream); opacity: 0.7; font-size: 14px; margin-top: 0; margin-bottom: 20px; font-weight: 500;">Apunta al QR con la cámara</p>
            
            <div id="reader"></div>
            
            <div id="errorCamara" style="display: none; color: #E74C3C; font-size: 13px; margin-bottom: 20px; padding: 10px; background: rgba(231, 76, 60, 0.1); border-radius: 8px;">
                No se pudo activar la cámara. Por favor, usa la búsqueda manual.
            </div>
            
            <div class="separador">o ingresa celular</div>
            
            <div class="input-manual-group">
                <input type="tel" id="inputTelBusqueda" placeholder="Ej: 2215551234">
                <button id="btnBuscarManual" class="btn btn-brand">Buscar Manualmente</button>
            </div>
        </div>
    </div>

    <div id="pantallaAcciones">
        <div class="acciones-content">
            <div class="cliente-info-header">
                <div class="cliente-avatar" id="uiAvatar">A</div>
                <div class="cliente-textos">
                    <div class="cliente-nombre" id="uiNombre">Nombre...</div>
                    <span class="cliente-tel" id="uiTel">Teléfono...</span>
                </div>
            </div>

            <div class="estado-sellos-container">
                <div class="estado-sellos-texto">TAZAS SERVIDAS</div>
                <div class="estado-sellos-numero"><span id="uiSellos" style="opacity: 1; color: var(--bronze);">0</span> <span>/10</span></div>
            </div>

            <div class="btn-stack">
                <button id="btnSumar" class="btn btn-brand">+ Servir 1 Taza</button>
                <button id="btnCanjear" class="btn btn-gold">☕ Entregar Premio</button>
                
                <div style="display: flex; gap: 12px; width: 100%; margin-top: 10px;">
                    <button id="btnRestar" class="btn btn-outlined" style="flex: 1;">Corregir (-1)</button>
                    <button id="btnVolver" class="btn btn-outlined" style="flex: 1; border-color: rgba(231, 76, 60, 0.3); color: #E74C3C;">Cerrar Ficha</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        class CafeBaristaApp {
            constructor() {
                const firebaseConfig = {
                    apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
                    authDomain: "club-cafe-app.firebaseapp.com",
                    databaseURL: "https://club-cafe-app-default-rtdb.firebaseio.com",
                    projectId: "club-cafe-app",
                    storageBucket: "club-cafe-app.firebasestorage.app",
                    messagingSenderId: "1007849307452",
                    appId: "1:1007849307452:web:2472f6b2cab7deeae53239",
                    measurementId: "G-6314S7TS0T"
                };

                this.app = initializeApp(firebaseConfig);
                this.db = getFirestore(this.app);

                this.html5QrCode = null;
                this.clienteActualId = null;
                this.puntosActuales = 0;
                this.pinCorrecto = "2026"; 

                this.ui = {
                    login: document.getElementById('pantallaLogin'),
                    busqueda: document.getElementById('pantallaBusqueda'),
                    acciones: document.getElementById('pantallaAcciones'),
                    loader: document.getElementById('mensajeLoader'),
                    pinInput: document.getElementById('inputPin'),
                    errorCamara: document.getElementById('errorCamara'),
                    // Elementos de Modales Personalizados
                    modalAlerta: document.getElementById('modalAlertaCustom'),
                    textoAlerta: document.getElementById('textoAlertaCustom'),
                    modalConfirm: document.getElementById('modalConfirmCustom'),
                    textoConfirm: document.getElementById('textoConfirmCustom')
                };

                this.audioBeep = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU'); 

                this.iniciarEventos();
                this.verificarSeguridad();
            }

            // --- SISTEMA DE MODALES PERSONALIZADOS ---
            mostrarAlerta(mensaje) {
                this.ui.textoAlerta.innerText = mensaje;
                this.ui.modalAlerta.style.display = 'flex';
            }

            mostrarConfirmacion(mensaje, callbackAceptar) {
                this.ui.textoConfirm.innerText = mensaje;
                this.ui.modalConfirm.style.display = 'flex';
                
                document.getElementById('btnAceptarConfirm').onclick = () => {
                    this.ui.modalConfirm.style.display = 'none';
                    callbackAceptar();
                };
                
                document.getElementById('btnCancelarConfirm').onclick = () => {
                    this.ui.modalConfirm.style.display = 'none';
                };
            }

            iniciarEventos() {
                // Evento cerrar alerta
                document.getElementById('btnCerrarAlerta').addEventListener('click', () => {
                    this.ui.modalAlerta.style.display = 'none';
                });

                document.getElementById('btnDesbloquear').addEventListener('click', () => this.verificarPin());
                this.ui.pinInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') this.verificarPin(); });
                
                document.getElementById('btnBuscarManual').addEventListener('click', () => {
                    let tel = document.getElementById('inputTelBusqueda').value.replace(/\D/g,'');
                    if(tel.length < 8) return this.mostrarAlerta("Número inválido. Ingrese al menos 8 dígitos.");
                    this.pausarCamara();
                    this.buscarClienteEnFirebase(tel);
                });

                document.getElementById('btnSumar').addEventListener('click', () => this.modificarSellos(1));
                document.getElementById('btnRestar').addEventListener('click', () => this.modificarSellos(-1));
                document.getElementById('btnCanjear').addEventListener('click', () => this.canjearPremio());
                document.getElementById('btnVolver').addEventListener('click', () => this.volverABuscar());
            }

            reproducirBeep() { try { this.audioBeep.play().catch(e=>{}); } catch(e){} }
            vibrar(patron) { if ("vibrate" in navigator) { navigator.vibrate(patron); } }

            verificarSeguridad() {
                if (localStorage.getItem('baristaAutorizado') === 'true') {
                    this.ui.login.style.display = 'none';
                    this.iniciarCamara();
                }
            }

            verificarPin() {
                const pinIngresado = this.ui.pinInput.value;
                if (pinIngresado === this.pinCorrecto) {
                    localStorage.setItem('baristaAutorizado', 'true');
                    this.ui.login.style.display = 'none';
                    this.iniciarCamara();
                } else {
                    this.ui.pinInput.classList.add('error-shake');
                    this.vibrar([100, 50, 100]); 
                    setTimeout(() => {
                        this.ui.pinInput.classList.remove('error-shake');
                        this.ui.pinInput.value = '';
                    }, 400);
                }
            }

            iniciarCamara() {
                this.ui.errorCamara.style.display = 'none';
                if (!this.html5QrCode) { this.html5QrCode = new Html5Qrcode("reader"); }
                
                this.html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 180, height: 180 } },
                    (decodedText) => this.onScanSuccess(decodedText),
                    () => { }
                ).catch((err) => {
                    console.error("Fallo cámara: ", err);
                    this.ui.errorCamara.style.display = 'block'; 
                });
            }

            pausarCamara() {
                if (this.html5QrCode && this.html5QrCode.isScanning) {
                    this.html5QrCode.stop().catch(err => console.log(err));
                }
            }

            onScanSuccess(decodedText) {
                this.reproducirBeep();
                this.vibrar(100);
                this.pausarCamara();
                this.buscarClienteEnFirebase(decodedText);
            }

            async buscarClienteEnFirebase(telefono) {
                this.ui.busqueda.style.display = 'none';
                this.ui.loader.style.display = 'block';

                try {
                    const docRef = doc(this.db, "clientes", telefono);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const datos = docSnap.data();
                        this.clienteActualId = telefono;
                        this.puntosActuales = datos.puntos;
                        
                        document.getElementById('uiNombre').innerText = datos.nombre;
                        document.getElementById('uiTel').innerText = telefono;
                        document.getElementById('uiSellos').innerText = this.puntosActuales;
                        document.getElementById('uiAvatar').innerText = datos.nombre.charAt(0).toUpperCase();

                        this.actualizarBotonesAccion();

                        this.ui.loader.style.display = 'none';
                        this.ui.acciones.style.display = 'flex'; 
                    } else {
                        this.mostrarAlerta("Cliente no encontrado en la base de datos.");
                        this.volverABuscar();
                    }
                } catch (error) {
                    this.mostrarAlerta("Error de conexión con el servidor.");
                    this.volverABuscar();
                }
            }

            actualizarBotonesAccion() {
                if(this.puntosActuales >= 10) {
                    document.getElementById('btnSumar').style.display = 'none';
                    document.getElementById('btnCanjear').style.display = 'block';
                } else {
                    document.getElementById('btnSumar').style.display = 'block';
                    document.getElementById('btnCanjear').style.display = 'none';
                }
            }

            async modificarSellos(cantidad) {
                if(cantidad === -1 && this.puntosActuales <= 0) return;
                if(cantidad === 1 && this.puntosActuales >= 10) return;

                const btn = document.getElementById('btnSumar');
                const btnOriginal = btn.innerText;
                btn.innerText = "...";
                btn.disabled = true;

                try {
                    const docRef = doc(this.db, "clientes", this.clienteActualId);
                    await updateDoc(docRef, { puntos: increment(cantidad) });
                    
                    this.puntosActuales += cantidad;
                    document.getElementById('uiSellos').innerText = this.puntosActuales;
                    this.vibrar(50); 
                    
                    this.actualizarBotonesAccion();

                } catch(e) {
                    this.mostrarAlerta("Ocurrió un error al guardar el sello.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = btnOriginal;
                }
            }

            canjearPremio() {
                this.mostrarConfirmacion("¿Confirmas la entrega de la bebida gratis?", async () => {
                    try {
                        const docRef = doc(this.db, "clientes", this.clienteActualId);
                        const fechaAutomatica = new Date().toISOString(); 
                        
                        await updateDoc(docRef, { 
                            puntos: 0,
                            ultimoPremio: fechaAutomatica, 
                            totalPremiosCanjeados: increment(1) 
                        }); 
                        
                        this.vibrar([100, 50, 100, 50, 200]); 
                        this.mostrarAlerta("¡Premio registrado correctamente!");
                        this.volverABuscar(); 
                    } catch(e) {
                        this.mostrarAlerta("Error al reiniciar la tarjeta.");
                    }
                });
            }

            volverABuscar() {
                this.ui.acciones.style.display = 'none';
                this.ui.loader.style.display = 'none';
                this.ui.busqueda.style.display = 'block';
                document.getElementById('inputTelBusqueda').value = "";
                this.clienteActualId = null;
                this.iniciarCamara();
            }
        }

        window.onload = () => {
            window.miCaja = new CafeBaristaApp(); 
        };
    </script>
</body>
</html>
